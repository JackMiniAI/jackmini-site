<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're in — jackmini.com</title>
  <style>
    :root { --bg: #0a0a0a; --text: #F5F5F5; --muted: #888; --cyan: #00D4FF; --border: #222; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 480px; text-align: center; }
    .icon { font-size: 48px; margin-bottom: 24px; }
    h1 { font-size: 32px; font-weight: 800; margin-bottom: 16px; }
    h1 span { color: var(--cyan); }
    p { color: var(--muted); font-size: 17px; line-height: 1.6; margin-bottom: 12px; }
    a { color: var(--cyan); text-decoration: none; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .next { font-size: 14px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Check your <span>inbox.</span></h1>
    <p>Your kit is on its way — look for an email from <strong>jack@jackmini.com</strong>.</p>
    <p>If it doesn't arrive in a few minutes, check spam.</p>
    <hr class="divider" />
    <p class="next">While you wait: <a href="https://x.com/JackMiniAI">follow @JackMiniAI</a> for daily build-in-public updates, or <a href="/blog/">read the blog</a>.</p>
  </div>
</body>
</html>
